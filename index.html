<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Clicker (Fixed)</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
  overflow:hidden;
}

/* 🌌 stars */
.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.7;
  animation:fall linear infinite;
}
@keyframes fall {
  from {transform:translateY(-10px);}
  to {transform:translateY(100vh);}
}

/* UI */
.container {
  position:relative;
  z-index:2;
}

h1 { margin:10px; }

.stats { font-size:18px; margin:5px; }

/* button */
#clickBtn {
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.1s;
}
#clickBtn:active {
  transform:scale(1.2);
}

/* skins */
.skin-blue { background:linear-gradient(cyan,blue); }
.skin-red { background:linear-gradient(red,orange); }
.skin-green { background:linear-gradient(lime,green); }

/* shop */
#shop {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.skinCard {
  background:#222;
  padding:10px;
  border-radius:10px;
}

/* boss */
#bossBox {
  position:fixed;
  top:10px;
  width:80%;
  left:10%;
  display:none;
}
#bossHP {
  height:20px;
  background:red;
}
#bossBar {
  height:100%;
  background:lime;
  width:100%;
}

/* explosion */
.explosion {
  position:absolute;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
  animation:boom 0.5s forwards;
}
@keyframes boom {
  to { transform:scale(5); opacity:0; }
}

/* leaderboard */
#leaderboard {
  position:fixed;
  right:10px;
  top:10px;
  font-size:14px;
  text-align:right;
}
</style>
</head>

<body>

<div id="stars"></div>

<div class="container">
<h1>🌌 Galaxy Clicker</h1>

<div class="stats">Clicks: <span id="clicks">0</span></div>
<div class="stats">Coins: <span id="coins">0</span></div>
<div class="stats">Time: <span id="time">20</span></div>

<button id="startBtn">Start</button><br>
<button id="clickBtn" disabled>CLICK</button>
</div>

<!-- boss -->
<div id="bossBox">
  <div id="bossHP"><div id="bossBar"></div></div>
</div>

<!-- shop -->
<div id="shop"></div>

<!-- leaderboard -->
<div id="leaderboard"></div>

<script>
let clicks=0, coins=0, time=20;
let active=false;
let skin="blue";

let owned = JSON.parse(localStorage.getItem("owned")) || ["blue"];
coins = Number(localStorage.getItem("coins")) || 0;

const clicksEl=document.getElementById("clicks");
const coinsEl=document.getElementById("coins");
const timeEl=document.getElementById("time");
const btn=document.getElementById("clickBtn");
const shop=document.getElementById("shop");

/* 🌌 stars */
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"%";
 s.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(s);
}

/* update UI */
function updateUI(){
 clicksEl.textContent=clicks;
 coinsEl.textContent=coins;
 btn.className="skin-"+skin;
}

/* start */
startBtn.onclick=()=>{
 active=true;
 btn.disabled=false;
};

/* click */
btn.onclick=(e)=>{
 if(!active) return;

 clicks++;
 coins+=1;

 spawnExplosion(e);

 updateUI();

 if(clicks===100) time+=50;
 if(clicks===150) startBoss();
};

/* explosion */
function spawnExplosion(e){
 let ex=document.createElement("div");
 ex.className="explosion";
 ex.style.left=e.clientX+"px";
 ex.style.top=e.clientY+"px";
 document.body.appendChild(ex);
 setTimeout(()=>ex.remove(),500);
}

/* boss */
let bossHP=100;
function startBoss(){
 document.getElementById("bossBox").style.display="block";
 bossHP=100;
}

setInterval(()=>{
 if(!active) return;

 time--;
 timeEl.textContent=time;

 if(time<=0){
   active=false;
   btn.disabled=true;
   saveScore();
 }

},1000);

/* shop system */
const skins = [
 {name:"blue", cost:0},
 {name:"red", cost:50},
 {name:"green", cost:100}
];

function renderShop(){
 shop.innerHTML="";
 skins.forEach(s=>{
   let div=document.createElement("div");
   div.className="skinCard";

   let ownedText = owned.includes(s.name) ? "Use" : "Buy";

   div.innerHTML=`
     <div>${s.name}</div>
     <div>${s.cost}</div>
     <button>${ownedText}</button>
   `;

   div.querySelector("button").onclick=()=>{
     if(owned.includes(s.name)){
       skin=s.name;
     } else if(coins>=s.cost){
       coins-=s.cost;
       owned.push(s.name);
       localStorage.setItem("owned", JSON.stringify(owned));
     }
     save();
     updateUI();
     renderShop();
   };

   shop.appendChild(div);
 });
}

/* save */
function save(){
 localStorage.setItem("coins", coins);
}

/* leaderboard */
let lb=JSON.parse(localStorage.getItem("lb"))||[];
function saveScore(){
 lb.push(clicks);
 lb.sort((a,b)=>b-a);
 lb=lb.slice(0,5);
 localStorage.setItem("lb",JSON.stringify(lb));
 renderLB();
}

function renderLB(){
 let html="<b>Top</b><br>";
 lb.forEach(s=>html+=s+"<br>");
 document.getElementById("leaderboard").innerHTML=html;
}

/* init */
updateUI();
renderShop();
renderLB();
</script>

</body>
</html>
