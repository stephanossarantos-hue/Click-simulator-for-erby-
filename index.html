<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Speed Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 20px;
  font-size: 6vw;
}

.stats {
  font-size: 4vw;
  margin: 10px;
}

#clickBtn {
  margin-top: 30px;
  font-size: 6vw;
  padding: 25px 40px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, #00ffcc, #00ccff);
  color: black;
  box-shadow: 0 0 20px #00ccff;
  transition: transform 0.1s, box-shadow 0.2s;
}

#clickBtn:active {
  transform: scale(1.2);
  box-shadow: 0 0 40px #00ffff;
}

#restartBtn {
  display: none;
  font-size: 5vw;
  padding: 15px 30px;
  border-radius: 15px;
  border: none;
  background: #ff4444;
  color: white;
  margin-top: 20px;
}

#wasted {
  position: fixed;
  top: 40%;
  width: 100%;
  font-size: 15vw;
  color: red;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.5s ease;
}

.showWasted {
  opacity: 1 !important;
  transform: scale(1.2) !important;
}

/* Particle */
.particle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: cyan;
  border-radius: 50%;
  pointer-events: none;
  animation: explode 0.6s forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>⚡ Click Speed Game</h1>

<div class="stats">Clicks: <span id="clicks">0</span></div>
<div class="stats">CPS: <span id="cps">0</span></div>
<div class="stats">Time: <span id="time">20</span>s</div>

<button id="clickBtn">TAP FAST</button>
<br>
<button id="restartBtn">Restart</button>

<div id="wasted">WASTED</div>

<script>
let clicks = 0;
let clicksThisSecond = 0;
let timeLeft = 20;
let started = false;
let gameActive = false;

const clicksEl = document.getElementById("clicks");
const cpsEl = document.getElementById("cps");
const timeEl = document.getElementById("time");
const btn = document.getElementById("clickBtn");
const restartBtn = document.getElementById("restartBtn");
const wasted = document.getElementById("wasted");

// Start game on first tap
btn.addEventListener("click", (e) => {
  if (!started) {
    started = true;
    gameActive = true;
  }

  if (!gameActive) return;

  clicks++;
  clicksThisSecond++;
  clicksEl.textContent = clicks;

  // SUPER animation: particles
  for (let i = 0; i < 6; i++) {
    let p = document.createElement("div");
    p.className = "particle";

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 80 + 20;

    p.style.setProperty("--x", Math.cos(angle) * distance + "px");
    p.style.setProperty("--y", Math.sin(angle) * distance + "px");

    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 600);
  }
});

// Game loop
const interval = setInterval(() => {
  if (!started || !gameActive) return;

  cpsEl.textContent = clicksThisSecond;
  clicksThisSecond = 0;

  timeLeft--;
  timeEl.textContent = timeLeft;

  if (timeLeft <= 0) {
    gameActive = false;
    btn.disabled = true;

    wasted.classList.add("showWasted");

    restartBtn.style.display = "inline-block";
  }
}, 1000);

// Restart
restartBtn.addEventListener("click", () => {
  clicks = 0;
  clicksThisSecond = 0;
  timeLeft = 20;
  started = false;
  gameActive = false;

  clicksEl.textContent = 0;
  cpsEl.textContent = 0;
  timeEl.textContent = 20;

  btn.disabled = false;

  wasted.classList.remove("showWasted");
  restartBtn.style.display = "none";
});
</script>

</body>
</html>
