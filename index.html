<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Chaos Clicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* 🌌 STARS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: fall linear infinite;
}
@keyframes fall {
  from { transform: translateY(-10px); }
  to { transform: translateY(100vh); }
}

/* UI */
.container {
  position: relative;
  z-index: 2;
  padding: 10px;
}

button {
  font-size: 5vw;
  padding: 10px 20px;
  margin: 5px;
  border-radius: 15px;
  border: none;
}

/* skins */
.skin-blue { background: linear-gradient(cyan, blue); }
.skin-red { background: linear-gradient(red, orange); }
.skin-green { background: linear-gradient(lime, green); }

/* explosion */
.explosion {
  position: absolute;
  width: 10px;
  height: 10px;
  background: yellow;
  border-radius: 50%;
  animation: boom 0.5s forwards;
}
@keyframes boom {
  to { transform: scale(6); opacity: 0; }
}

/* boss */
#boss {
  position: fixed;
  top: 10%;
  width: 80%;
  left: 10%;
  height: 25px;
  background: red;
  display: none;
}
#bossBar {
  height: 100%;
  background: lime;
  width: 100%;
}

/* leaderboard */
#leaderboard {
  position: fixed;
  right: 5px;
  top: 5px;
  font-size: 3vw;
  text-align: right;
}

/* shake */
.shake {
  animation: shake 0.2s;
}
@keyframes shake {
  25% { transform: translate(-5px,5px); }
  50% { transform: translate(5px,-5px); }
}

/* wasted */
#wasted {
  position: fixed;
  top: 40%;
  width: 100%;
  font-size: 12vw;
  color: red;
  opacity: 0;
  transform: scale(0.5);
  transition: 0.5s;
}
.show { opacity: 1; transform: scale(1.4); }
</style>
</head>

<body>

<div id="stars"></div>

<div class="container">
<h1>🌌 Galaxy Chaos Clicker</h1>

<div>Clicks: <span id="clicks">0</span></div>
<div>Time: <span id="time">20</span></div>
<div>High Score: <span id="high">0</span></div>

<button id="startBtn">START</button><br>
<button id="clickBtn" disabled class="skin-blue">CLICK</button><br>

<button onclick="buySkin('red')">Red (200)</button>
<button onclick="buySkin('green')">Green (400)</button>
</div>

<div id="boss"><div id="bossBar"></div></div>
<div id="leaderboard"></div>
<div id="wasted">WASTED</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6d1c.mp3">
</audio>
<audio id="clickSound">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c1a4c6f5b6.mp3">
</audio>

<script>
let clicks=0,time=20,active=false,mult=1;
let high=localStorage.getItem("high")||0;
let leaderboard=JSON.parse(localStorage.getItem("lb"))||[];

let bossHP=100,boss=false;

const clicksEl=clicksSpan=document.getElementById("clicks");
const timeEl=document.getElementById("time");
const highEl=document.getElementById("high");

const btn=document.getElementById("clickBtn");
const start=document.getElementById("startBtn");

const bossBar=document.getElementById("bossBar");
const bossUI=document.getElementById("boss");

const wasted=document.getElementById("wasted");

const bg=document.getElementById("bgMusic");
const clickS=document.getElementById("clickSound");

highEl.textContent=high;

/* 🌌 stars */
for(let i=0;i<120;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"%";
 s.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(s);
}

/* start */
start.onclick=()=>{
 active=true;
 btn.disabled=false;
 bg.play();
};

/* click */
btn.onclick=(e)=>{
 if(!active)return;

 clicks+=mult;
 clicksEl.textContent=clicks;

 clickS.currentTime=0;
 clickS.play();

 document.body.classList.add("shake");
 setTimeout(()=>document.body.classList.remove("shake"),150);

 explode(e);

 if(clicks===100){time+=50;}
 if(clicks===250){time+=120;mult=2;}

 if(clicks===150 && !boss)startBoss();

 if(boss){
   bossHP-=2;
   bossBar.style.width=bossHP+"%";
   if(bossHP<=0){
     boss=false;
     bossUI.style.display="none";
     time+=20;
   }
 }
};

/* explosion */
function explode(e){
 let x=document.createElement("div");
 x.className="explosion";
 x.style.left=e.clientX+"px";
 x.style.top=e.clientY+"px";
 document.body.appendChild(x);
 setTimeout(()=>x.remove(),500);
}

/* boss */
function startBoss(){
 boss=true;
 bossHP=100;
 bossUI.style.display="block";
}

/* skins */
function buySkin(c){
 let cost=c==="red"?200:400;
 if(clicks>=cost){
   localStorage.setItem("skin",c);
   location.reload();
 }
}

/* loop */
setInterval(()=>{
 if(!active)return;

 time--;
 timeEl.textContent=time;

 if(time<=0){
   active=false;
   btn.disabled=true;

   wasted.classList.add("show");

   if(clicks>high){
     localStorage.setItem("high",clicks);
     highEl.textContent=clicks;
   }

   leaderboard.push(clicks);
   leaderboard.sort((a,b)=>b-a);
   leaderboard=leaderboard.slice(0,5);
   localStorage.setItem("lb",JSON.stringify(leaderboard));

   showLB();
 }
},1000);

/* leaderboard */
function showLB(){
 let html="<b>Top</b><br>";
 leaderboard.forEach(s=>html+=s+"<br>");
 document.getElementById("leaderboard").innerHTML=html;
}
</script>

</body>
</html>
